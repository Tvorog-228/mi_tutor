<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LanguageCoach MultiPro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .glass { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(12px); }
        .scenario-btn.active { border-color: #3b82f6; background: rgba(59, 130, 246, 0.2); }
        .tab-btn.active { color: #3b82f6; border-bottom: 2px solid #3b82f6; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-slate-950 text-slate-200 min-h-screen font-sans">

    <div id="auth-screen" class="fixed inset-0 z-[80] bg-slate-950 flex items-center justify-center p-6 hidden">
        <div class="bg-slate-900 border border-slate-800 p-8 rounded-3xl w-full max-w-md shadow-2xl">
            <h2 class="text-2xl font-bold text-white mb-6 text-center">LanguageCoach</h2>
            <input type="text" id="auth-user" placeholder="Usuario / User" class="w-full bg-slate-800 border border-slate-700 rounded-xl p-3 mb-3 outline-none focus:border-blue-500 text-white">
            <input type="password" id="auth-pass" placeholder="Password" class="w-full bg-slate-800 border border-slate-700 rounded-xl p-3 mb-6 outline-none focus:border-blue-500 text-white">
            <button onclick="handleAuth()" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-3 rounded-xl transition">Entrar / Login</button>
        </div>
    </div>

    <div id="lang-screen" class="fixed inset-0 z-[75] bg-slate-950 flex items-center justify-center p-6 hidden">
        <div class="bg-slate-900 border border-slate-800 p-8 rounded-3xl w-full max-w-md shadow-2xl text-center">
            <h2 class="text-xl font-bold text-white mb-6">¿Qué quieres estudiar?<br>What do you want to study?</h2>
            <div class="grid grid-cols-2 gap-4">
                <button onclick="selectLanguage('es')" class="bg-slate-800 hover:bg-blue-900 p-6 rounded-2xl border border-slate-700 transition group">
                    <span class="text-4xl block mb-2">🇪🇸</span>
                    <span class="font-bold">Español</span>
                </button>
                <button onclick="selectLanguage('en')" class="bg-slate-800 hover:bg-blue-900 p-6 rounded-2xl border border-slate-700 transition group">
                    <span class="text-4xl block mb-2">🇺🇸</span>
                    <span class="font-bold">English</span>
                </button>
            </div>
        </div>
    </div>

    <div id="setup-screen" class="fixed inset-0 z-[70] glass flex items-center justify-center p-6 hidden">
        <div class="bg-slate-900 border border-slate-800 p-8 rounded-3xl w-full max-w-md shadow-2xl text-center">
            <h2 class="text-xl font-bold text-white mb-2" id="setup-title">Configuración Groq</h2>
            <input type="password" id="api-key-input" placeholder="gsk_..." class="w-full bg-slate-800 border border-slate-700 rounded-xl p-3 mb-4 outline-none focus:border-blue-500 text-white text-center">
            <button onclick="saveApiKey()" class="w-full bg-blue-600 py-3 rounded-xl font-bold" id="setup-btn">Guardar Key</button>
        </div>
    </div>

    <div class="flex flex-col h-screen max-w-lg mx-auto border-x border-slate-900 bg-slate-950">
        <header class="p-4 border-b border-slate-900 bg-slate-950/50 flex justify-between items-center">
            <div>
                <h1 class="text-lg font-bold text-blue-500 leading-tight">LanguageCoach <span class="text-[10px] text-slate-600 block" id="user-display"></span></h1>
                <div class="flex gap-4 mt-2">
                    <button onclick="showTab('chat')" class="tab-btn active text-[10px] font-bold uppercase tracking-widest pb-1" id="tab-chat-btn">Chat</button>
                    <button onclick="showTab('library')" class="tab-btn text-[10px] font-bold uppercase tracking-widest pb-1" id="tab-library-btn">Biblioteca</button>
                </div>
            </div>
            <div class="flex flex-col gap-1 items-end">
                <button onclick="logout()" id="btn-logout" class="text-[9px] text-slate-600 uppercase border border-slate-800 px-2 py-1 rounded">Salir</button>
                <button onclick="changeLang()" id="btn-change-lang" class="text-[9px] text-blue-800 uppercase font-bold">Cambiar Idioma</button>
            </div>
        </header>

        <div id="view-chat" class="flex flex-col flex-grow overflow-hidden">
            <div class="p-3 bg-slate-900/30 border-b border-slate-900 grid grid-cols-2 gap-2">
                <select id="voice-select" class="bg-slate-800 text-[10px] p-1 rounded border border-slate-700 text-white outline-none"></select>
                <div class="flex items-center gap-2 px-1">
                    <input type="range" id="speed-slider" min="0.5" max="2.0" step="0.1" value="1.0" class="w-full h-1 bg-slate-800 rounded-lg appearance-none accent-blue-500">
                    <span class="text-[10px] text-slate-500 w-8" id="speed-val">1.0x</span>
                </div>
            </div>

            <div class="p-2 flex gap-2 overflow-x-auto no-scrollbar border-b border-slate-900">
                <button onclick="setScenario('general')" class="scenario-btn active whitespace-nowrap px-3 py-1.5 rounded-full border border-slate-800 text-[10px] font-bold uppercase" id="btn-general">🏠 Gral</button>
                <button onclick="setScenario('entrevista')" class="scenario-btn whitespace-nowrap px-3 py-1.5 rounded-full border border-slate-800 text-[10px] font-bold uppercase" id="btn-entrevista">💼 Job</button>
                <button onclick="setScenario('amigo')" class="scenario-btn whitespace-nowrap px-3 py-1.5 rounded-full border border-slate-800 text-[10px] font-bold uppercase" id="btn-amigo">🍻 Friend</button>
            </div>

            <main id="chat-history" class="flex-grow overflow-y-auto p-4 space-y-4 flex flex-col scroll-smooth">
                <div id="welcome-msg" class="bg-slate-900 text-slate-400 self-start p-3 rounded-2xl text-xs border border-slate-800 italic">
                    Hola. Estoy listo para ayudarte.
                </div>
            </main>

            <footer class="p-4 glass border-t border-slate-900">
                <div class="flex flex-col gap-2">
                    <p id="status" class="text-[9px] text-slate-600 text-center uppercase tracking-widest h-3 font-bold">Ready</p>
                    <div class="flex items-center gap-2">
                        <button id="record-btn" class="bg-blue-600 w-11 h-11 rounded-full flex-shrink-0 flex items-center justify-center text-xl shadow-lg">🎤</button>
                        <input type="text" id="text-input" placeholder="..." class="flex-grow bg-slate-900 border border-slate-800 rounded-full px-4 py-3 text-sm outline-none text-white">
                        <button id="send-btn" class="bg-slate-800 w-11 h-11 rounded-full flex-shrink-0 flex items-center justify-center text-lg">🚀</button>
                    </div>
                </div>
            </footer>
        </div>

        <div id="view-library" class="flex flex-col flex-grow overflow-hidden hidden">
            <div id="text-buttons" class="p-4 flex gap-2 overflow-x-auto no-scrollbar border-b border-slate-900 bg-slate-900/20"></div>
            <div id="text-display" class="flex-grow overflow-y-auto p-6 leading-relaxed text-slate-300 text-base select-text" onmouseup="handleWordSelection()"></div>
            <div class="p-4 bg-slate-900/50 border-t border-slate-900">
                <h4 id="vocab-title" class="text-[10px] text-slate-500 uppercase tracking-widest mb-2 font-bold">Palabras:</h4>
                <div id="vocab-list" class="flex flex-wrap gap-2 text-[10px]"></div>
            </div>
        </div>
    </div>

    <script>
        // --- DICCIONARIO MULTILINGÜE ---
        const I18N = {
            es: {
                welcome: "Hola. Estoy listo para ayudarte a practicar español.",
                chat: "Chat", library: "Biblioteca", logout: "Salir", change: "Cambiar Idioma",
                setupTitle: "Configuración Groq", setupBtn: "Guardar", status: "Listo",
                inputPlaceholder: "Escribe aquí...", vocabTitle: "Mi Vocabulario (ES):",
                confirmWord: "¿Añadir a tu base de datos?",
                texts: ["📜 Constancia", "📜 Entrevista", "📜 Viajes"],
                scenarios: { general: "🏠 Gral", entrevista: "💼 Trabajo", amigo: "🍻 Amigo" },
                prompts: {
                    general: "Eres un tutor de español amable.",
                    entrevista: "Eres un reclutador exigente en una empresa española.",
                    amigo: "Eres un colega muy cercano que usa jerga española y tono relajado.",
                    rules: "REGLAS: 1. Da una [CORRECCIÓN] breve si hay errores. 2. Responde al [DIÁLOGO] (máx 30 palabras). 3. RETO: Usa estas palabras: "
                },
                libraryTexts: [
                    "El aprendizaje requiere constancia. Es vital hablar sin miedo a errores.",
                    "En una entrevista, la comunicación no verbal es clave. Muestra entusiasmo.",
                    "Viajar es la mejor práctica. Confirma tu alojamiento al llegar."
                ]
            },
            en: {
                welcome: "Hi. I'm ready to help you practice English.",
                chat: "Chat", library: "Library", logout: "Logout", change: "Change Language",
                setupTitle: "Groq Settings", setupBtn: "Save Key", status: "Ready",
                inputPlaceholder: "Type here...", vocabTitle: "My Vocabulary (EN):",
                confirmWord: "Add to your database?",
                texts: ["📜 Consistency", "📜 Interview", "📜 Travel"],
                scenarios: { general: "🏠 Gen", entrevista: "💼 Job", amigo: "🍻 Buddy" },
                prompts: {
                    general: "You are a friendly English tutor.",
                    entrevista: "You are a demanding recruiter in a UK company.",
                    amigo: "You are a close friend using English slang and a relaxed tone.",
                    rules: "RULES: 1. Provide a brief [CORRECTION] if there are mistakes. 2. Continue the [DIALOGUE] (max 30 words). 3. CHALLENGE: Use these words: "
                },
                libraryTexts: [
                    "Language learning requires consistency. It's vital to speak without fear.",
                    "In an interview, non-verbal communication is key. Show enthusiasm.",
                    "Traveling is the best practice. Confirm your accommodation upon arrival."
                ]
            }
        };

        let currentUser = localStorage.getItem('logged_user');
        let studyLang = localStorage.getItem('study_lang') || 'es';
        let currentScenario = 'general';
        let voices = [];

        // --- FLUJO ---
        function updateAppFlow() {
            if (!currentUser) { document.getElementById('auth-screen').classList.remove('hidden'); return; }
            document.getElementById('auth-screen').classList.add('hidden');

            if (!localStorage.getItem('study_lang')) { document.getElementById('lang-screen').classList.remove('hidden'); return; }
            document.getElementById('lang-screen').classList.add('hidden');

            if (!localStorage.getItem('groq_api_key')) { document.getElementById('setup-screen').classList.remove('hidden'); return; }
            document.getElementById('setup-screen').classList.add('hidden');

            applyLanguageUI();
            renderVocab();
        }

        function applyLanguageUI() {
            const lang = I18N[studyLang];
            document.getElementById('user-display').innerText = `${currentUser} | ${studyLang.toUpperCase()}`;
            document.getElementById('tab-chat-btn').innerText = lang.chat;
            document.getElementById('tab-library-btn').innerText = lang.library;
            document.getElementById('btn-logout').innerText = lang.logout;
            document.getElementById('btn-change-lang').innerText = lang.change;
            document.getElementById('setup-title').innerText = lang.setupTitle;
            document.getElementById('setup-btn').innerText = lang.setupBtn;
            document.getElementById('status').innerText = lang.status;
            document.getElementById('text-input').placeholder = lang.inputPlaceholder;
            document.getElementById('vocab-title').innerText = lang.vocabTitle;
            document.getElementById('welcome-msg').innerText = lang.welcome;

            document.getElementById('btn-general').innerText = lang.scenarios.general;
            document.getElementById('btn-entrevista').innerText = lang.scenarios.entrevista;
            document.getElementById('btn-amigo').innerText = lang.scenarios.amigo;

            // Renderizar botones de biblioteca
            const btnCont = document.getElementById('text-buttons');
            btnCont.innerHTML = lang.texts.map((t, i) => `<button onclick="loadText(${i})" class="bg-slate-800 px-4 py-2 rounded-xl text-xs font-bold whitespace-nowrap">${t}</button>`).join('');
            document.getElementById('text-display').innerText = studyLang === 'es' ? "Selecciona un texto..." : "Select a text...";

            loadVoices();
        }

        window.onload = updateAppFlow;

        // --- ACCIONES ---
        function handleAuth() {
            const user = document.getElementById('auth-user').value.trim();
            if (user) { localStorage.setItem('logged_user', user); currentUser = user; updateAppFlow(); }
        }

        function selectLanguage(l) { localStorage.setItem('study_lang', l); studyLang = l; updateAppFlow(); }
        function changeLang() { localStorage.removeItem('study_lang'); location.reload(); }
        function logout() { localStorage.removeItem('logged_user'); location.reload(); }
        function saveApiKey() {
            const k = document.getElementById('api-key-input').value.trim();
            if (k.startsWith('gsk_')) { localStorage.setItem('groq_api_key', k); updateAppFlow(); }
        }

        function showTab(tab) {
            document.getElementById('view-chat').classList.toggle('hidden', tab !== 'chat');
            document.getElementById('view-library').classList.toggle('hidden', tab !== 'library');
            document.getElementById('tab-chat-btn').classList.toggle('active', tab === 'chat');
            document.getElementById('tab-library-btn').classList.toggle('active', tab === 'library');
        }

        // --- BIBLIOTECA ---
        function loadText(idx) { document.getElementById('text-display').innerText = I18N[studyLang].libraryTexts[idx]; }

        function handleWordSelection() {
            const s = window.getSelection().toString().trim();
            if (s && s.length > 2 && s.length < 25) {
                if (confirm(`${I18N[studyLang].confirmWord} "${s}"`)) {
                    let v = JSON.parse(localStorage.getItem(`vocab_${currentUser}_${studyLang}`) || "[]");
                    if (!v.includes(s.toLowerCase())) {
                        v.push(s.toLowerCase());
                        localStorage.setItem(`vocab_${currentUser}_${studyLang}`, JSON.stringify(v));
                        renderVocab();
                    }
                }
            }
        }

        function renderVocab() {
            const v = JSON.parse(localStorage.getItem(`vocab_${currentUser}_${studyLang}`) || "[]");
            document.getElementById('vocab-list').innerHTML = v.map(w => `<span class="bg-blue-900/40 text-blue-300 px-2 py-1 rounded border border-blue-800/50 capitalize">${w}</span>`).join('');
        }

        // --- IA ---
        async function processWithGroq(text) {
            const key = localStorage.getItem('groq_api_key');
            const langData = I18N[studyLang];
            const vocab = JSON.parse(localStorage.getItem(`vocab_${currentUser}_${studyLang}`) || "[]");
            const randomWords = vocab.sort(() => 0.5 - Math.random()).slice(0, 3);

            document.getElementById('status').innerText = "...";

            const systemPrompt = `${langData.prompts[currentScenario]} ${langData.prompts.rules} ${randomWords.join(", ")}`;

            try {
                const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                    method: "POST",
                    headers: { "Content-Type": "application/json", "Authorization": `Bearer ${key}` },
                    body: JSON.stringify({
                        model: "llama-3.3-70b-versatile",
                        messages: [{ role: "system", content: systemPrompt }, { role: "user", content: text }]
                    })
                });
                const data = await response.json();
                const aiMsg = data.choices[0].message.content;
                addMessage(aiMsg, 'ai');
                speak(aiMsg);
            } catch (err) { addMessage("Error.", 'system'); }
            finally { document.getElementById('status').innerText = langData.status; }
        }

        // --- VOZ ---
        function loadVoices() {
            voices = window.speechSynthesis.getVoices();
            const voiceSelect = document.getElementById('voice-select');
            // Filtrar según idioma de estudio
            const prefix = studyLang === 'es' ? 'es' : 'en';
            const filtered = voices.filter(v => v.lang.startsWith(prefix));
            voiceSelect.innerHTML = (filtered.length > 0 ? filtered : voices)
                .map(v => `<option value="${voices.indexOf(v)}">${v.name}</option>`).join('');
        }
        window.speechSynthesis.onvoiceschanged = loadVoices;

        function speak(text) {
            window.speechSynthesis.cancel();
            const u = new SpeechSynthesisUtterance(text);
            const vIdx = document.getElementById('voice-select').value;
            if (vIdx !== "" && voices[vIdx]) u.voice = voices[vIdx];
            u.rate = parseFloat(document.getElementById('speed-slider').value);
            u.lang = studyLang === 'es' ? 'es-ES' : 'en-US';
            window.speechSynthesis.speak(u);
        }

        const Recognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        const rec = Recognition ? new Recognition() : null;
        if (rec) {
            rec.onresult = (e) => handleUserMessage(e.results[0][0].transcript);
            rec.onend = () => document.getElementById('record-btn').classList.remove('bg-red-600', 'animate-pulse');
        }

        document.getElementById('record-btn').onclick = () => {
            if (rec) {
                rec.lang = studyLang === 'es' ? 'es-ES' : 'en-US';
                rec.start();
                document.getElementById('record-btn').classList.add('bg-red-600', 'animate-pulse');
            }
        };

        document.getElementById('send-btn').onclick = () => {
            const i = document.getElementById('text-input');
            if (i.value.trim()) { handleUserMessage(i.value.trim()); i.value = ''; }
        };

        function handleUserMessage(t) { addMessage(t, 'user'); processWithGroq(t); }

        function addMessage(t, type) {
            const div = document.createElement('div');
            const styles = {
                user: "bg-blue-600 text-white self-end p-3 rounded-2xl rounded-tr-none text-xs max-w-[85%]",
                ai: "bg-slate-900 text-slate-300 self-start p-3 rounded-2xl rounded-tl-none text-xs max-w-[85%] border border-slate-800",
                system: "bg-slate-800/50 text-slate-500 self-center text-[9px] py-1 px-3 rounded-full uppercase font-bold"
            };
            div.className = styles[type];
            div.innerText = t;
            const h = document.getElementById('chat-history');
            h.appendChild(div);
            h.scrollTop = h.scrollHeight;
        }

        function setScenario(id) {
            currentScenario = id;
            document.querySelectorAll('.scenario-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById(`btn-${id}`).classList.add('active');
        }
    </script>
</body>
</html>
