<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LanguageCoach Pro | AI Tutor</title>
    <script src="https://cdn.tailwindcss.com?plugins=typography"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        .glass { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(12px); }
        .scenario-btn.active { border-color: #3b82f6; background: rgba(59, 130, 246, 0.2); color: #60a5fa; }
        .tab-btn.active { color: #3b82f6; border-bottom: 2px solid #3b82f6; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        #chat-history::-webkit-scrollbar { width: 4px; }
        #chat-history::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 10px; }
    </style>
</head>
<body class="bg-slate-950 text-slate-200 min-h-screen font-sans">

    <div id="auth-screen" class="fixed inset-0 z-[80] bg-slate-950 flex items-center justify-center p-6 hidden">
        <div class="bg-slate-900 border border-slate-800 p-8 rounded-3xl w-full max-w-md shadow-2xl">
            <h2 class="text-2xl font-bold text-white mb-6 text-center">LanguageCoach</h2>
            <input type="text" id="auth-user" placeholder="Usuario / User" class="w-full bg-slate-800 border border-slate-700 rounded-xl p-3 mb-3 outline-none focus:border-blue-500 text-white">
            <button onclick="handleAuth()" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-3 rounded-xl transition">Entrar / Login</button>
        </div>
    </div>

    <div id="lang-screen" class="fixed inset-0 z-[75] bg-slate-950 flex items-center justify-center p-6 hidden">
        <div class="bg-slate-900 border border-slate-800 p-8 rounded-3xl w-full max-w-md shadow-2xl text-center">
            <h2 class="text-xl font-bold text-white mb-6">¿Qué quieres estudiar?<br>What do you want to study?</h2>
            <div class="grid grid-cols-2 gap-4">
                <button onclick="selectLanguage('es')" class="bg-slate-800 hover:bg-blue-900 p-6 rounded-2xl border border-slate-700 transition">
                    <span class="text-4xl block mb-2">🇪🇸</span>
                    <span class="font-bold">Español</span>
                </button>
                <button onclick="selectLanguage('en')" class="bg-slate-800 hover:bg-blue-900 p-6 rounded-2xl border border-slate-700 transition">
                    <span class="text-4xl block mb-2">🇺🇸</span>
                    <span class="font-bold">English</span>
                </button>
            </div>
        </div>
    </div>

    <div id="setup-screen" class="fixed inset-0 z-[70] glass flex items-center justify-center p-6 hidden">
        <div class="bg-slate-900 border border-slate-800 p-8 rounded-3xl w-full max-w-md shadow-2xl text-center">
            <h2 class="text-xl font-bold text-white mb-2" id="setup-title">API Key de Groq</h2>
            <p class="text-[10px] text-slate-500 mb-4 uppercase tracking-widest">Introduce tu clave gsk_ para continuar</p>
            <input type="password" id="api-key-input" placeholder="gsk_..." class="w-full bg-slate-800 border border-slate-700 rounded-xl p-3 mb-4 outline-none focus:border-blue-500 text-white text-center">
            <button onclick="saveApiKey()" class="w-full bg-blue-600 py-3 rounded-xl font-bold" id="setup-btn">Conectar IA</button>
        </div>
    </div>

    <div class="flex flex-col h-screen max-w-lg mx-auto border-x border-slate-900 bg-slate-950">
        <header class="p-4 border-b border-slate-900 bg-slate-950/50 flex justify-between items-center">
            <div>
                <h1 class="text-lg font-bold text-blue-500 leading-tight">LanguageCoach <span class="text-[10px] text-slate-600 block" id="user-display"></span></h1>
                <div class="flex gap-4 mt-2">
                    <button onclick="showTab('chat')" class="tab-btn active text-[10px] font-bold uppercase tracking-widest pb-1" id="tab-chat-btn">Chat</button>
                    <button onclick="showTab('library')" class="tab-btn text-[10px] font-bold uppercase tracking-widest pb-1" id="tab-library-btn">Biblioteca</button>
                </div>
            </div>
            <div class="flex flex-col gap-1 items-end">
                <button onclick="logout()" id="btn-logout" class="text-[9px] text-slate-600 uppercase border border-slate-800 px-2 py-1 rounded">Salir</button>
                <button onclick="changeLang()" id="btn-change-lang" class="text-[9px] text-blue-800 uppercase font-bold">Idioma</button>
            </div>
        </header>

        <div id="view-chat" class="flex flex-col flex-grow overflow-hidden">
            <div class="p-3 bg-slate-900/30 border-b border-slate-900 grid grid-cols-2 gap-2">
                <select id="voice-select" class="bg-slate-800 text-[10px] p-1 rounded border border-slate-700 text-white outline-none"></select>
                <div class="flex items-center gap-2 px-1">
                    <input type="range" id="speed-slider" min="0.5" max="2.0" step="0.1" value="1.0" class="w-full h-1 bg-slate-800 rounded-lg appearance-none accent-blue-500">
                    <span class="text-[10px] text-slate-500 w-8" id="speed-val">1.0x</span>
                </div>
            </div>

            <div class="p-2 flex gap-2 overflow-x-auto no-scrollbar border-b border-slate-900 bg-slate-950">
                <button onclick="setScenario('general')" class="scenario-btn active whitespace-nowrap px-3 py-1.5 rounded-full border border-slate-800 text-[10px] font-bold uppercase" id="btn-general">🏠 Gral</button>
                <button onclick="setScenario('entrevista')" class="scenario-btn whitespace-nowrap px-3 py-1.5 rounded-full border border-slate-800 text-[10px] font-bold uppercase" id="btn-entrevista">💼 Job</button>
                <button onclick="setScenario('amigo')" class="scenario-btn whitespace-nowrap px-3 py-1.5 rounded-full border border-slate-800 text-[10px] font-bold uppercase" id="btn-amigo">🍻 Friend</button>
                <button onclick="resetHistory()" class="whitespace-nowrap px-3 py-1.5 rounded-full border border-red-900 text-[9px] font-bold uppercase text-red-700">🧹 Clear</button>
            </div>

            <main id="chat-history" class="flex-grow overflow-y-auto p-4 space-y-4 flex flex-col scroll-smooth"></main>

            <footer class="p-4 glass border-t border-slate-900">
                <div class="flex flex-col gap-2">
                    <p id="status" class="text-[9px] text-slate-600 text-center uppercase tracking-widest h-3 font-bold">Ready</p>
                    <div class="flex items-center gap-2">
                        <button id="record-btn" class="bg-blue-600 w-11 h-11 rounded-full flex-shrink-0 flex items-center justify-center text-xl shadow-lg">🎤</button>
                        <input type="text" id="text-input" placeholder="..." class="flex-grow bg-slate-900 border border-slate-800 rounded-full px-4 py-3 text-sm outline-none text-white focus:border-blue-500 transition-all">
                        <button id="send-btn" class="bg-slate-800 w-11 h-11 rounded-full flex-shrink-0 flex items-center justify-center text-lg">🚀</button>
                    </div>
                </div>
            </footer>
        </div>

        <div id="view-library" class="flex flex-col flex-grow overflow-hidden hidden">
            <div id="text-buttons" class="p-4 flex gap-2 overflow-x-auto no-scrollbar border-b border-slate-900 bg-slate-900/20"></div>

            <div id="text-display" class="flex-grow overflow-y-auto p-6 select-text prose prose-invert prose-slate max-w-none" onmouseup="handleWordSelection()"></div>

            <div class="p-4 bg-slate-900/50 border-t border-slate-900">
                <h4 id="vocab-title" class="text-[10px] text-slate-500 uppercase tracking-widest mb-2 font-bold">Vocabulario:</h4>
                <div id="vocab-list" class="flex flex-wrap gap-2 text-[10px]"></div>
            </div>
        </div>
    </div>

    <script>
        const I18N = {
            es: {
                welcome: "¡Hola! Soy tu tutor personal. ¿Cómo estás hoy?",
                chat: "Chat", library: "Biblioteca", logout: "Salir", change: "Idioma",
                setupTitle: "Clave Groq", setupBtn: "Conectar", status: "Listo",
                inputPlaceholder: "Escribe un mensaje...", vocabTitle: "Palabras guardadas:",
                confirmWord: "¿Añadir a tu vocabulario?",
                scenarios: { general: "🏠 General", entrevista: "💼 Entrevista", amigo: "🍻 Colega" },
                libPrompt: "Buscando noticias frescas..."
            },
            en: {
                welcome: "Hi there! I'm your personal tutor. How are you doing today?",
                chat: "Chat", library: "Library", logout: "Logout", change: "Language",
                setupTitle: "Groq API Key", setupBtn: "Connect", status: "Ready",
                inputPlaceholder: "Type a message...", vocabTitle: "Saved Words:",
                confirmWord: "Add to your vocabulary?",
                scenarios: { general: "🏠 General", entrevista: "💼 Interview", amigo: "🍻 Buddy" },
                libPrompt: "Searching for top news..."
            }
        };

        let currentUser = localStorage.getItem('logged_user');
        let studyLang = localStorage.getItem('study_lang') || 'es';
        let currentScenario = 'general';
        let voices = [];
        let currentUtterance = null;
        let conversationHistory = [];
        const MAX_HISTORY = 8;

        function loadVoices() {
            voices = window.speechSynthesis.getVoices();
            if (voices.length > 0) {
                const voiceSelect = document.getElementById('voice-select');
                const prefix = studyLang === 'es' ? 'es' : 'en';
                let filtered = voices.filter(v => v.lang.toLowerCase().startsWith(prefix));
                if (filtered.length === 0) filtered = voices;
                voiceSelect.innerHTML = filtered.map(v => `<option value="${voices.indexOf(v)}">${v.name}</option>`).join('');
                clearInterval(vInterval);
            }
        }
        const vInterval = setInterval(loadVoices, 250);
        window.speechSynthesis.onvoiceschanged = loadVoices;

        function primeSpeech() { window.speechSynthesis.speak(new SpeechSynthesisUtterance("")); }

        function speak(text) {
            if (!text) return;
            window.speechSynthesis.cancel();
            currentUtterance = new SpeechSynthesisUtterance(text);
            const vIdx = document.getElementById('voice-select').value;
            if (vIdx !== "" && voices[vIdx]) currentUtterance.voice = voices[vIdx];
            currentUtterance.lang = studyLang === 'es' ? 'es-ES' : 'en-US';
            currentUtterance.rate = parseFloat(document.getElementById('speed-slider').value);
            window.speechSynthesis.speak(currentUtterance);
        }

        async function fetchNews() {
            // URL del feed de MIT Technology Review
            const feedUrl = "https://www.technologyreview.com/feed/";
            const proxyUrl = `https://api.allorigins.win/get?url=${encodeURIComponent(feedUrl)}`;

            const btnCont = document.getElementById('text-buttons');
            btnCont.innerHTML = `<span class="text-xs text-slate-400 my-auto ml-2 animate-pulse">Conectando con MIT Tech Review...</span>`;

            try {
                const response = await fetch(proxyUrl);
                const data = await response.json();

                // El contenido viene como un string de XML dentro de data.contents
                const parser = new DOMParser();
                const xmlDoc = parser.parseFromString(data.contents, "text/xml");
                const items = xmlDoc.querySelectorAll("item");

                if (items.length > 0) {
                    btnCont.innerHTML = "";
                    // Tomamos los últimos 8 artículos
                    items.forEach((item, index) => {
                        if (index > 7) return;

                        const title = item.querySelector("title").textContent;
                        const link = item.querySelector("link").textContent;

                        const btn = document.createElement('button');
                        btn.className = "bg-slate-800 hover:bg-blue-900 border border-slate-700 px-4 py-2 rounded-xl text-xs font-bold whitespace-nowrap transition-all shadow-md text-slate-300";
                        btn.innerText = `🔬 ${title.substring(0, 30)}...`;
                        btn.onclick = () => loadFullNews(link, title);
                        btnCont.appendChild(btn);
                    });
                } else {
                    btnCont.innerHTML = `<span class="text-xs text-red-400 my-auto ml-2">No se pudieron cargar noticias.</span>`;
                }
            } catch (err) {
                console.error(err);
                btnCont.innerHTML = `<span class="text-xs text-red-400 my-auto ml-2">Error de conexión al RSS.</span>`;
            }
        }

        function renderNewsButtons(articles) {
            const btnCont = document.getElementById('text-buttons');
            btnCont.innerHTML = "";

            articles.forEach((art) => {
                if(!art.title || art.title === "[Removed]") return;

                const btn = document.createElement('button');
                btn.className = "bg-slate-800 hover:bg-blue-900 border border-slate-700 px-4 py-2 rounded-xl text-xs font-bold whitespace-nowrap transition-all shadow-md text-slate-300";
                btn.innerText = `📰 ${art.title.substring(0, 25)}...`;
                btn.onclick = () => loadFullNews(art.url, art.title);
                btnCont.appendChild(btn);
            });
        }

        async function loadFullNews(newsUrl, title) {
            const display = document.getElementById('text-display');
            const key = localStorage.getItem('groq_api_key');

            if (!key) {
                display.innerHTML = `<div class="text-red-400 not-prose">Por favor, conecta tu API Key de Groq en los ajustes para usar la limpieza por IA.</div>`;
                return;
            }

            display.innerHTML = `<div class="text-center mt-10 text-slate-400 animate-pulse not-prose">
                <span class="text-2xl block mb-2">🤖</span>
                ${studyLang === 'es' ? 'La IA está limpiando la noticia por fragmentos...' : 'AI is cleaning the news in chunks...'}
                <div id="ai-progress" class="text-xs mt-2 text-slate-500 font-mono">Iniciando lectura...</div>
            </div>`;

            try {
                // 1. Traer el texto bruto de Jina AI
                const response = await fetch(`https://r.jina.ai/${newsUrl}`, { headers: { "Accept": "text/plain" } });
                let rawText = await response.text();

                // 2. Trocear el texto en bloques de ~900 caracteres (sin romper párrafos)
                const paragraphs = rawText.split('\n');
                const chunks = [];
                let currentChunk = "";

                for (const p of paragraphs) {
                    // Si el párrafo cabe en el bloque actual, lo añadimos
                    if (currentChunk.length + p.length < 900) {
                        currentChunk += p + "\n";
                    } else {
                        // Si no cabe, guardamos el bloque actual y empezamos uno nuevo
                        if (currentChunk.trim()) chunks.push(currentChunk.trim());
                        currentChunk = p + "\n";
                    }
                }
                if (currentChunk.trim()) chunks.push(currentChunk.trim());

                // Ponemos un límite de 10 bloques (9000 caracteres) para no gastar toda tu cuota de Groq de golpe
                const maxChunks = Math.min(chunks.length, 10);
                let finalCleanText = "";

                // 3. El Prompt maestro para el filtro
                const systemPrompt = `
                    Eres un experto en curación de contenidos tecnológicos.
                    Tu objetivo es limpiar un fragmento de un artículo de MIT Technology Review.

                    INSTRUCCIONES:
                    1. Mantén exclusivamente el cuerpo del artículo.
                    2. Usa formato Markdown limpio: # para títulos, ## para subtítulos, ** para énfasis.
                    3. ELIMINA: Menús de navegación, enlaces de "Suscríbete", publicidad, pies de página,
                       redes sociales y avisos de cookies.
                    4. IMPORTANTE: Si el fragmento contiene solo nombres de autores o fechas sin texto relevante, responde "EMPTY_CHUNK".
                    5. No añadidas comentarios personales, solo devuelve el texto limpio.
                `;
                // 4. Procesar cada bloque con Groq (uno por uno para evitar Rate Limits)
                for (let i = 0; i < maxChunks; i++) {
                    document.getElementById('ai-progress').innerText = `Analizando bloque ${i + 1} de ${maxChunks}...`;

                    const groqResponse = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                        method: "POST",
                        headers: { "Content-Type": "application/json", "Authorization": `Bearer ${key}` },
                        body: JSON.stringify({
                            model: "llama-3.3-70b-versatile",
                            temperature: 0.1, // Súper bajo para que sea estricto y no invente
                            messages: [
                                { role: "system", content: systemPrompt },
                                { role: "user", content: chunks[i] }
                            ]
                        })
                    });

                    const groqData = await groqResponse.json();
                    if (groqData.error) throw new Error(groqData.error.message);

                    const cleanedChunk = groqData.choices[0].message.content.trim();

                    // Si Groq determina que el bloque tiene valor (no es EMPTY_CHUNK), lo añadimos al resultado final
                    if (cleanedChunk && !cleanedChunk.includes("EMPTY_CHUNK")) {
                        finalCleanText += cleanedChunk + "\n\n";
                    }
                }

                // 5. Convertir a HTML bonito con marked.js y renderizar
                if (!finalCleanText.trim()) {
                    finalCleanText = "La IA no pudo rescatar texto útil de esta URL. Puede ser un muro de pago o una página protegida.";
                }

                const htmlContent = marked.parse(finalCleanText);

                display.innerHTML = `
                    <h1 class="border-b border-slate-700 pb-4 mb-6">${title}</h1>
                    ${htmlContent}
                `;
                display.scrollTop = 0;

            } catch (err) {
                console.error(err);
                display.innerHTML = `<div class="text-red-400 not-prose">Error en la IA: ${err.message || 'Intenta con otra noticia.'}</div>`;
            }
        }
        // --- FLUJO Y RESTO DE LA APP (SIN CAMBIOS) ---
        function updateAppFlow() {
            if (!currentUser) { document.getElementById('auth-screen').classList.remove('hidden'); return; }
            document.getElementById('auth-screen').classList.add('hidden');
            if (!localStorage.getItem('study_lang')) { document.getElementById('lang-screen').classList.remove('hidden'); return; }
            document.getElementById('lang-screen').classList.add('hidden');
            if (!localStorage.getItem('groq_api_key')) { document.getElementById('setup-screen').classList.remove('hidden'); return; }
            document.getElementById('setup-screen').classList.add('hidden');

            applyLanguageUI();
            if (conversationHistory.length === 0) addMessage(I18N[studyLang].welcome, 'ai');
            renderVocab();
        }

        function applyLanguageUI() {
            const lang = I18N[studyLang];
            document.getElementById('user-display').innerText = `${currentUser} | ${studyLang.toUpperCase()}`;
            document.getElementById('tab-chat-btn').innerText = lang.chat;
            document.getElementById('tab-library-btn').innerText = lang.library;
            document.getElementById('btn-logout').innerText = lang.logout;
            document.getElementById('btn-change-lang').innerText = lang.change;
            document.getElementById('setup-title').innerText = lang.setupTitle;
            document.getElementById('setup-btn').innerText = lang.setupBtn;
            document.getElementById('status').innerText = lang.status;
            document.getElementById('text-input').placeholder = lang.inputPlaceholder;
            document.getElementById('vocab-title').innerText = lang.vocabTitle;
            document.getElementById('btn-general').innerText = lang.scenarios.general;
            document.getElementById('btn-entrevista').innerText = lang.scenarios.entrevista;
            document.getElementById('btn-amigo').innerText = lang.scenarios.amigo;
            document.getElementById('text-display').innerText = lang.libPrompt;

            fetchNews();
            loadVoices();
        }

        window.onload = updateAppFlow;

        function handleAuth() { primeSpeech(); const user = document.getElementById('auth-user').value.trim(); if (user) { localStorage.setItem('logged_user', user); currentUser = user; updateAppFlow(); } }
        function selectLanguage(l) { primeSpeech(); localStorage.setItem('study_lang', l); studyLang = l; resetHistory(); location.reload(); }
        function changeLang() { localStorage.removeItem('study_lang'); location.reload(); }
        function logout() { localStorage.removeItem('logged_user'); location.reload(); }
        function saveApiKey() { primeSpeech(); const k = document.getElementById('api-key-input').value.trim(); if (k.startsWith('gsk_')) { localStorage.setItem('groq_api_key', k); updateAppFlow(); } }
        function resetHistory() { conversationHistory = []; document.getElementById('chat-history').innerHTML = ""; addMessage(I18N[studyLang].welcome, 'ai'); }

        async function processWithGroq(text) {
            const key = localStorage.getItem('groq_api_key');
            const vocab = JSON.parse(localStorage.getItem(`vocab_${currentUser}_${studyLang}`) || "[]");

            conversationHistory.push({ role: "user", content: text });
            if (conversationHistory.length > MAX_HISTORY) conversationHistory.shift();

            document.getElementById('status').innerText = "...";

            const systemPrompt = `
                Eres un tutor de ${studyLang === 'es' ? 'español' : 'inglés'} humano, empático y muy conversacional.
                Escenario: "${currentScenario}".
                OBJETIVO: Mantén una charla fluida, interesante y educativa.
                REGLAS:
                1. NO uses etiquetas como [CORRECTION] o [DIALOGUE]. Escribe como una persona real.
                2. Si hay errores, corrígelos con amabilidad dentro de la charla.
                3. Da respuestas ricas en información (2-3 frases) y TERMINA SIEMPRE CON UNA PREGUNTA.
                4. Vocabulario del usuario: [${vocab.join(", ")}]. Si puedes, usa alguna de estas palabras de forma natural.
            `;

            try {
                const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                    method: "POST",
                    headers: { "Content-Type": "application/json", "Authorization": `Bearer ${key}` },
                    body: JSON.stringify({
                        model: "llama-3.3-70b-versatile",
                        messages: [{ role: "system", content: systemPrompt }, ...conversationHistory]
                    })
                });
                const data = await response.json();
                const aiMsg = data.choices[0].message.content;

                conversationHistory.push({ role: "assistant", content: aiMsg });
                addMessage(aiMsg, 'ai');
                speak(aiMsg);
            } catch (err) { addMessage("Error de conexión.", 'system'); }
            finally { document.getElementById('status').innerText = I18N[studyLang].status; }
        }

        const Recognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        const rec = Recognition ? new Recognition() : null;
        if (rec) { rec.onresult = (e) => handleUserMessage(e.results[0][0].transcript); rec.onend = () => document.getElementById('record-btn').classList.remove('bg-red-600', 'animate-pulse'); }

        document.getElementById('record-btn').onclick = () => { primeSpeech(); if (rec) { rec.lang = studyLang === 'es' ? 'es-ES' : 'en-US'; rec.start(); document.getElementById('record-btn').classList.add('bg-red-600', 'animate-pulse'); } };
        document.getElementById('send-btn').onclick = () => { primeSpeech(); const i = document.getElementById('text-input'); const val = i.value.trim(); if (val) { handleUserMessage(val); i.value = ''; } };
        document.getElementById('text-input').onkeydown = (e) => { if(e.key === 'Enter') { primeSpeech(); document.getElementById('send-btn').click(); } };

        function handleUserMessage(t) { addMessage(t, 'user'); processWithGroq(t); }

        function addMessage(t, type) {
            const div = document.createElement('div');
            const styles = {
                user: "bg-blue-600 text-white self-end p-3 rounded-2xl rounded-tr-none text-xs max-w-[85%] shadow-lg",
                ai: "bg-slate-900 text-slate-200 self-start p-3 rounded-2xl rounded-tl-none text-xs max-w-[85%] border border-slate-800 cursor-pointer",
                system: "bg-slate-800/50 text-slate-500 self-center text-[9px] py-1 px-3 rounded-full uppercase font-bold"
            };
            div.className = styles[type] + " transition-all duration-300 animate-in fade-in slide-in-from-bottom-2";
            div.innerText = t;
            if (type === 'ai') div.onclick = () => speak(t);
            const h = document.getElementById('chat-history');
            h.appendChild(div);
            h.scrollTo({ top: h.scrollHeight, behavior: 'smooth' });
        }

        function showTab(tab) {
            document.getElementById('view-chat').classList.toggle('hidden', tab !== 'chat');
            document.getElementById('view-library').classList.toggle('hidden', tab !== 'library');
            document.getElementById('tab-chat-btn').classList.toggle('active', tab === 'chat');
            document.getElementById('tab-library-btn').classList.toggle('active', tab === 'library');
        }

        function handleWordSelection() {
            const s = window.getSelection().toString().trim();
            if (s && s.length > 2 && s.length < 20) {
                if (confirm(`${I18N[studyLang].confirmWord} "${s}"`)) {
                    let v = JSON.parse(localStorage.getItem(`vocab_${currentUser}_${studyLang}`) || "[]");
                    if (!v.includes(s.toLowerCase())) {
                        v.push(s.toLowerCase());
                        localStorage.setItem(`vocab_${currentUser}_${studyLang}`, JSON.stringify(v));
                        renderVocab();
                    }
                }
            }
        }

        function renderVocab() {
            const v = JSON.parse(localStorage.getItem(`vocab_${currentUser}_${studyLang}`) || "[]");
            document.getElementById('vocab-list').innerHTML = v.map(w => `<span class="bg-blue-900/30 text-blue-400 px-2 py-1 rounded border border-blue-800/50 capitalize">${w}</span>`).join('');
        }

        function setScenario(id) { primeSpeech(); currentScenario = id; document.querySelectorAll('.scenario-btn').forEach(btn => btn.classList.remove('active')); document.getElementById(`btn-${id}`).classList.add('active'); resetHistory(); addMessage(`Scenario: ${id}`, 'system'); }
        document.getElementById('speed-slider').oninput = (e) => { document.getElementById('speed-val').innerText = e.target.value + 'x'; };
    </script>
</body>
</html>
