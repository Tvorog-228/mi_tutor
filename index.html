<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Language Coach</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .glass { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(12px); }
        .scenario-btn.active { border-color: #3b82f6; background: rgba(59, 130, 246, 0.2); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-slate-950 text-slate-200 min-h-screen font-sans">

    <div id="setup-screen" class="fixed inset-0 z-50 glass flex items-center justify-center p-6 hidden">
        <div class="bg-slate-900 border border-slate-800 p-8 rounded-3xl w-full max-w-md shadow-2xl">
            <h2 class="text-2xl font-bold text-white mb-2 text-center">Configuración</h2>
            <input type="password" id="api-key-input" placeholder="Pega tu Groq Key aquí..." class="w-full bg-slate-800 border border-slate-700 rounded-xl p-3 mb-4 outline-none focus:border-blue-500 transition text-white text-center">
            <button onclick="saveApiKey()" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-3 rounded-xl transition">Empezar a practicar</button>
        </div>
    </div>

    <div class="flex flex-col h-screen max-w-lg mx-auto border-x border-slate-900 shadow-2xl bg-slate-950">

        <header class="p-6 border-b border-slate-900 bg-slate-950/50">
            <div class="flex justify-between items-center mb-4">
                <div>
                    <h1 class="text-xl font-bold text-blue-500 tracking-tight">LanguageCoach</h1>
                    <p id="current-scenario-label" class="text-[10px] text-slate-500 uppercase font-bold tracking-widest">Modo: General</p>
                </div>
                <button onclick="resetApp()" class="text-[10px] bg-slate-900 px-3 py-1 rounded-full border border-slate-800 text-slate-500 hover:text-red-400 transition">Reset Key</button>
            </div>

            <div class="flex flex-col gap-1">
                <label class="text-[9px] text-slate-400 uppercase font-bold tracking-widest">Seleccionar Voz:</label>
                <select id="voice-select" class="w-full bg-slate-800 border border-slate-700 rounded-lg p-2 text-xs text-white font-medium outline-none focus:border-blue-500 transition appearance-none">
                    <option value="">Buscando voces disponibles...</option>
                </select>
            </div>
        </header>

        <div class="p-4 flex gap-2 overflow-x-auto no-scrollbar border-b border-slate-900 bg-slate-950/30">
            <button onclick="setScenario('general')" class="scenario-btn active whitespace-nowrap px-4 py-2 rounded-full border border-slate-800 text-xs font-medium transition" id="btn-general">🏠 General</button>
            <button onclick="setScenario('entrevista')" class="scenario-btn whitespace-nowrap px-4 py-2 rounded-full border border-slate-800 text-xs font-medium transition" id="btn-entrevista">💼 Entrevista</button>
            <button onclick="setScenario('amigo')" class="scenario-btn whitespace-nowrap px-4 py-2 rounded-full border border-slate-800 text-xs font-medium transition" id="btn-amigo">🍻 Amigo</button>
            <button onclick="setScenario('viaje')" class="scenario-btn whitespace-nowrap px-4 py-2 rounded-full border border-slate-800 text-xs font-medium transition" id="btn-viaje">✈️ Viaje</button>
        </div>

        <main id="chat-history" class="flex-grow overflow-y-auto p-4 space-y-4 flex flex-col scroll-smooth">
            <div class="bg-slate-900 text-slate-300 self-start p-3 rounded-2xl rounded-tl-none text-sm max-w-[85%] border border-slate-800">
                ¡Hola! Soy tu tutor. Si el selector de arriba ya tiene opciones, elige tu favorita y hablemos.
            </div>
        </main>

        <footer class="p-4 glass border-t border-slate-900">
            <div class="flex flex-col gap-2">
                <p id="status" class="text-[9px] text-slate-600 text-center uppercase tracking-widest h-3 font-bold italic">Listo</p>
                <div class="flex items-center gap-2">
                    <button id="record-btn" class="bg-blue-600 hover:bg-blue-500 w-12 h-12 rounded-full flex-shrink-0 flex items-center justify-center text-xl shadow-lg active:scale-95 transition-all">🎤</button>
                    <input type="text" id="text-input" placeholder="Escribe o usa el micro..." class="flex-grow bg-slate-900 border border-slate-800 rounded-full px-4 py-3 text-sm focus:border-blue-500 outline-none text-white transition">
                    <button id="send-btn" class="bg-slate-800 hover:bg-slate-700 w-12 h-12 rounded-full flex-shrink-0 flex items-center justify-center text-lg active:scale-95 transition-all">🚀</button>
                </div>
            </div>
        </footer>
    </div>

    <script>
        const SCENARIOS = {
            general: "Eres un tutor de idiomas amable. Ayuda al usuario con su conversación diaria. Corrige brevemente si comete errores graves.",
            entrevista: "Eres un reclutador de una empresa internacional. Realiza una entrevista de trabajo profesional. Sé exigente.",
            amigo: "Eres un amigo cercano. Habla de forma casual, usa expresiones coloquiales (slang).",
            viaje: "Eres un recepcionista de un hotel. El usuario tiene problemas con su reserva. Sé educado."
        };

        let currentScenario = 'general';
        let currentUtterance = null;
        let voices = [];
        const apiKey = localStorage.getItem('groq_api_key');
        const voiceSelect = document.getElementById('voice-select');

        if (!apiKey) document.getElementById('setup-screen').classList.remove('hidden');

        // --- BUSCADOR AGRESIVO DE VOCES ---
        function loadVoices() {
            voices = window.speechSynthesis.getVoices();

            if (voices.length > 0) {
                // Primero intentamos filtrar por español
                let filteredVoices = voices.filter(v => v.lang.startsWith('es'));

                // Si no hay español, mostramos todas (mejor que nada)
                if (filteredVoices.length === 0) filteredVoices = voices;

                voiceSelect.innerHTML = filteredVoices.map(voice => {
                    const realIndex = voices.indexOf(voice);
                    return `<option value="${realIndex}">${voice.name} (${voice.lang})</option>`;
                }).join('');

                // Si encontramos voces, dejamos de preguntar
                if (voices.length > 0) clearInterval(voiceInterval);
            }
        }

        // Reintentar cada 250ms (Solución definitiva para Chrome y Safari)
        const voiceInterval = setInterval(loadVoices, 250);
        window.speechSynthesis.onvoiceschanged = loadVoices;
        loadVoices();

        function saveApiKey() {
            const key = document.getElementById('api-key-input').value.trim();
            if (key) { localStorage.setItem('groq_api_key', key); location.reload(); }
        }

        function resetApp() { localStorage.removeItem('groq_api_key'); location.reload(); }

        function setScenario(id) {
            currentScenario = id;
            document.querySelectorAll('.scenario-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById(`btn-${id}`).classList.add('active');
            document.getElementById('current-scenario-label').innerText = `Modo: ${id}`;
            addMessage(`Cambiando a escenario: ${id.toUpperCase()}`, 'system');
        }

        const chatHistory = document.getElementById('chat-history');
        const textInput = document.getElementById('text-input');
        const statusText = document.getElementById('status');

        async function processWithGroq(text) {
            const key = localStorage.getItem('groq_api_key');
            statusText.innerText = "Pensando...";
            try {
                const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                    method: "POST",
                    headers: { "Content-Type": "application/json", "Authorization": `Bearer ${key}` },
                    body: JSON.stringify({
                        model: "llama-3.3-70b-versatile",
                        messages: [
                            { role: "system", content: SCENARIOS[currentScenario] + " IMPORTANTE: Responde SIEMPRE en español. Corrige errores gramaticales al principio de tu respuesta si los hay." },
                            { role: "user", content: text }
                        ]
                    })
                });
                const data = await response.json();
                const aiMsg = data.choices[0].message.content;
                addMessage(aiMsg, 'ai');
                speak(aiMsg);
            } catch (err) { addMessage("Error: Verifica tu conexión o tu API Key.", 'system'); }
            finally { statusText.innerText = "Listo"; }
        }

        // CONFIGURACIÓN DE VOZ (STT)
        const Recognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        const recognition = Recognition ? new Recognition() : null;
        if (recognition) {
            recognition.lang = 'es-ES';
            recognition.onresult = (e) => handleUserMessage(e.results[0][0].transcript);
            recognition.onend = () => {
                document.getElementById('record-btn').classList.remove('bg-red-600', 'animate-pulse');
                if(statusText.innerText === "Escuchando...") statusText.innerText = "Listo";
            }
        }

        document.getElementById('record-btn').onclick = () => {
            // Desbloqueo de audio para Safari
            window.speechSynthesis.speak(new SpeechSynthesisUtterance(""));

            if(recognition) {
                recognition.start();
                document.getElementById('record-btn').classList.add('bg-red-600', 'animate-pulse');
                statusText.innerText = "Escuchando...";
            } else {
                alert("Tu navegador no soporta reconocimiento de voz.");
            }
        };

        function speak(text) {
            window.speechSynthesis.cancel();
            currentUtterance = new SpeechSynthesisUtterance(text);

            // Usar la voz del selector
            const selectedIndex = voiceSelect.value;
            if (selectedIndex !== "" && voices[selectedIndex]) {
                currentUtterance.voice = voices[selectedIndex];
            }

            currentUtterance.lang = 'es-ES';
            currentUtterance.rate = 1.0;
            window.speechSynthesis.speak(currentUtterance);
        }

        document.getElementById('send-btn').onclick = () => {
            const val = textInput.value.trim();
            if (val) { handleUserMessage(val); textInput.value = ''; }
        };

        textInput.onkeydown = (e) => { if (e.key === 'Enter') document.getElementById('send-btn').click(); };

        function handleUserMessage(text) {
            addMessage(text, 'user');
            processWithGroq(text);
        }

        function addMessage(text, type) {
            const div = document.createElement('div');
            const styles = {
                user: "bg-blue-600 text-white self-end p-3 rounded-2xl rounded-tr-none text-sm max-w-[85%] shadow-md",
                ai: "bg-slate-900 text-slate-300 self-start p-3 rounded-2xl rounded-tl-none text-sm max-w-[85%] border border-slate-800 shadow-sm",
                system: "bg-slate-800/50 text-slate-500 self-center text-[9px] py-1 px-4 rounded-full uppercase font-bold tracking-widest border border-slate-700/50"
            };
            div.className = styles[type];
            div.innerText = text;
            chatHistory.appendChild(div);
            chatHistory.scrollTop = chatHistory.scrollHeight;
        }
    </script>
</body>
</html>
